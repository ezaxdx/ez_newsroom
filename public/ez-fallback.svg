<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- 배경 -->
  <rect width="1200" height="630" fill="#1c1b1d"/>
  <!-- 상단 오렌지 줄 -->
  <rect width="1200" height="6" fill="#f97316"/>
  <!-- 중앙 로고 텍스트 -->
  <text x="600" y="270" text-anchor="middle" font-family="Arial Black, Arial, sans-serif"
    font-size="120" font-weight="900" letter-spacing="-4">
    <tspan fill="#f97316">ez</tspan><tspan fill="#e2e8f0">pmp</tspan>
  </text>
  <!-- 한글 사명 -->
  <text x="600" y="340" text-anchor="middle" font-family="Arial, sans-serif"
    font-size="28" fill="#94a3b8" letter-spacing="4">(주)이즈피엠피</text>
  <!-- 구분선 -->
  <line x1="480" y1="375" x2="720" y2="375" stroke="#f97316" stroke-width="2" opacity="0.5"/>
  <!-- 뉴스레터 이름 -->
  <text x="600" y="420" text-anchor="middle" font-family="Arial, sans-serif"
    font-size="22" fill="#64748b" letter-spacing="6">THE DAILY MONOLITH</text>
  <!-- 하단 오렌지 줄 -->
  <rect y="624" width="1200" height="6" fill="#f97316"/>
</svg>
